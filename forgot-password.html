<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Stackly</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;0,900&display=swap');

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Inter', sans-serif; background: #000B12; color: #FFFFFF;
      display: flex; align-items: center; justify-content: center;
    }

    /* Abstract background pattern */
    body::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(0, 102, 153, 0.2) 0%, rgba(0, 11, 18, 0) 60%);
      z-index: 0;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px; padding: 50px 40px; width: 100%; max-width: 420px; z-index: 10;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center;
    }

    .auth-icon {
      width: 60px; height: 60px; background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #FFD700; margin: 0 auto 25px auto;
    }

    .auth-title { font-family: 'Playfair Display', serif; font-size: 32px; margin: 0 0 10px 0; }
    .auth-subtitle { color: #A0C4D6; margin: 0 0 30px 0; font-size: 15px; line-height: 1.6; }

    /* Form Styles */
    .form-group { margin-bottom: 25px; text-align: left; }
    .form-control {
      width: 100%; padding: 16px 20px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
      color: #FFFFFF; font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: all 0.3s; box-sizing: border-box; text-align: center;
    }
    .form-control:focus { border-color: #FFD700; }
    .form-error { color: #EF4444; font-size: 13px; margin-top: 8px; display: none; text-align: center; }
    .form-control.invalid { border-color: #EF4444; }

    .btn-submit {
      width: 100%; padding: 18px; background: #FFD700; color: #00111A; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.3s;
    }
    .btn-submit:hover { background: #FFFFFF; box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15); transform: translateY(-2px); }

    .auth-footer { margin-top: 30px; font-size: 14px; }
    .auth-footer a { color: #A0C4D6; text-decoration: none; font-weight: 600; transition: color 0.3s; display: inline-flex; align-items: center; gap: 5px; }
    .auth-footer a:hover { color: #FFD700; }

    /* --- Preloader Styles --- */
    #preloader {
      position: fixed;
      inset: 0;
      background-color: #ffffff; 
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }
    .loader-stage {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 2.5rem;
    }
    .vehicle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      opacity: 0;
      color: #FFD700; /* Premium Gold Yellow */
    }
    .ship { animation: sequenceShip 3s linear forwards; }
    .truck { animation: sequenceTruck 3s linear forwards; }
    .plane { animation: sequencePlane 3s linear forwards; }
    @keyframes sequenceShip {
      0% { opacity: 0; transform: translate(-120%, -50%); }
      6.6% { opacity: 1; transform: translate(-50%, -50%); } 
      26.6% { opacity: 1; transform: translate(-50%, -50%); } 
      33.3% { opacity: 0; transform: translate(20%, -50%); } 
      100% { opacity: 0; transform: translate(20%, -50%); }
    }
    @keyframes sequenceTruck {
      0%, 33.3% { opacity: 0; transform: translate(-120%, -50%); }
      40% { opacity: 1; transform: translate(-50%, -50%); } 
      60% { opacity: 1; transform: translate(-50%, -50%); } 
      66.6% { opacity: 0; transform: translate(20%, -50%); } 
      100% { opacity: 0; transform: translate(20%, -50%); }
    }
    @keyframes sequencePlane {
      0%, 66.6% { opacity: 0; transform: translate(-120%, 20%); }
      73.3% { opacity: 1; transform: translate(-50%, -50%); } 
      93.3% { opacity: 1; transform: translate(-50%, -50%); } 
      100% { opacity: 0; transform: translate(20%, -120%); } 
    }
    .loading-text-container {
      color: #0f172a;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      height: 24px;
    }
    .loading-text::after {
      content: "Preparing Cargo...";
      animation: textChange 3s linear forwards;
    }
    @keyframes textChange {
      0%, 32.9% { content: "Loading Cargo..."; }
      33%, 65.9% { content: "Dispatching Fleet..."; }
      66%, 100% { content: "Taking Off..."; }
    }
    .progress-container {
      width: 240px;
      height: 4px;
      background-color: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: #FFD700;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
      animation: fillProgress 3s linear forwards;
    }
    @keyframes fillProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    .main-content {
      opacity: 0;
      transition: opacity 0.8s ease;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .main-content.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Preloader Overlay -->
  <div id="preloader">
    <div class="loader-stage">
      <!-- 1. Ship Icon -->
      <svg class="vehicle ship" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1 .6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1 .6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2"/>
        <path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.76"/>
        <path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/>
        <path d="M12 10v4"/>
        <path d="M12 2v3"/>
      </svg>
      <!-- 2. Truck Icon -->
      <svg class="vehicle truck" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13"></rect>
        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
        <circle cx="5.5" cy="18.5" r="2.5"></circle>
        <circle cx="18.5" cy="18.5" r="2.5"></circle>
      </svg>
      <!-- 3. Flight/Plane Icon -->
      <svg class="vehicle plane" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6.5 2.5L7 13l-4 1L2 15l4 2 2 4 1-1 1-4 2.5-2.5 2.5 6.5c.3.5.7.9 1.2.9.4.1.9-.3 1.1-.7l1.8-8.2z"/>
      </svg>
    </div>
    <div class="loading-text-container">
      <span class="loading-text"></span>
    </div>
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
  </div>

  <div id="mainContent" class="main-content">

  <div class="auth-card">
    <div class="auth-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <div class="auth-brand">
      <a href="index.html">
        <img src="whitelogo.webp" alt="Stackly Logo" style="height: 30px; filter: brightness(0) invert(1); margin: 0 auto 30px auto; display: block;">
      </a>
    </div>
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
        <div class="form-error" id="emailError">Please enter a valid email address.</div>
      </div>

      <button type="submit" class="btn-submit">Send Recovery Link</button>
    </form>

    <div class="auth-footer">
      <a href="login.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Return to Login
      </a>
    </div>
  </div>

  <script>
    const forgotForm = document.getElementById('forgotForm');
    
    forgotForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const emailInput = document.getElementById('email');
      const errorMsg = document.getElementById('emailError');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailRegex.test(emailInput.value)) {
        emailInput.classList.add('invalid');
        errorMsg.style.display = 'block';
      } else {
        emailInput.classList.remove('invalid');
        errorMsg.style.display = 'none';
        
        const btn = document.querySelector('.btn-submit');
        btn.innerText = 'Sending Link...';
        btn.style.opacity = '0.8';

        setTimeout(() => {
          alert('Password recovery instructions sent to your email.');
          window.location.href = '404.html';
        }, 1000);
      }
    });

    // Preloader Control Logic
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const preloader = document.getElementById('preloader');
        const mainContent = document.getElementById('mainContent');
        if (preloader) {
          preloader.style.opacity = '0';
          preloader.style.visibility = 'hidden';
          if (mainContent) mainContent.classList.add('visible');
          setTimeout(() => preloader.remove(), 500);
        }
      }, 3000);
    });
  </script>
  </div> <!-- End mainContent wrapper -->
</body>
</html>
