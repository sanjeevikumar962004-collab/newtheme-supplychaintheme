<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Lost at Sea</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap');

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      background: #000B12; color: #FFFFFF;
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
    }

    .bg-animation {
      position: absolute; inset: 0; z-index: 0;
      background: url('images/cargo-vessel-ship.webp') center/cover no-repeat;
      opacity: 0.15; filter: grayscale(100%);
    }

    .error-container {
      position: relative; z-index: 10; max-width: 600px; padding: 0 20px;
    }

    .error-code {
      font-family: 'Playfair Display', serif; font-size: 150px; font-weight: 900;
      color: transparent; -webkit-text-stroke: 2px #FFD700;
      margin: 0; line-height: 1; letter-spacing: -5px; text-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
    }

    .error-title {
      font-size: 32px; font-weight: 800; margin: 10px 0 20px 0; color: #FFFFFF; letter-spacing: -1px;
    }

    .error-desc {
      font-size: 18px; color: #A0C4D6; line-height: 1.6; margin: 0 auto 40px auto; max-width: 450px;
    }

    .btn-return {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 35px; background: #FFD700; color: #00111A;
      border-radius: 50px; font-size: 16px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-return:hover {
      background: #FFFFFF; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
    }

    .btn-return svg { transition: transform 0.3s; }
    .btn-return:hover svg { transform: translateX(-5px); }

    /* Floating radar animation */
    .radar {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 400px; height: 400px; border-radius: 50%; border: 1px solid rgba(255, 215, 0, 0.1);
      z-index: 1; pointer-events: none;
    }
    .radar::after {
      content: ''; position: absolute; inset: -1px; border-radius: 50%;
      border: 1px solid rgba(255, 215, 0, 0.3); animation: ping 3s infinite linear;
    }
    @keyframes ping {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="bg-animation"></div>
  <div class="radar"></div>

  <div class="error-container">
    <div class="auth-brand">
      <a href="index.html">
        <img src="whitelogo.webp" alt="Stackly Logo" style="height: 40px; filter: brightness(0) invert(1); margin: 0 auto 30px auto; display: block;">
      </a>
    </div>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Lost at Sea</h2>
    <p class="error-desc">The coordinates you entered don't exist in our navigational charts. Let's get your cargo back on the correct routing.</p>
    
    <a href="index.html" class="btn-return">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Return to Port
    </a>
  </div>

</body>
</html>
