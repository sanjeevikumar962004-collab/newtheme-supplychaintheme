<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Lost at Sea</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap');

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      background: #000B12; color: #FFFFFF;
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
    }

    .bg-animation {
      position: absolute; inset: 0; z-index: 0;
      background: url('images/cargo-vessel-ship.webp') center/cover no-repeat;
      opacity: 0.15; filter: grayscale(100%);
    }

    .error-container {
      position: relative; z-index: 10; max-width: 600px; padding: 0 20px;
    }

    .error-code {
      font-family: 'Playfair Display', serif; font-size: 150px; font-weight: 900;
      color: transparent; -webkit-text-stroke: 2px #FFD700;
      margin: 0; line-height: 1; letter-spacing: -5px; text-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
    }

    .error-title {
      font-size: 32px; font-weight: 800; margin: 10px 0 20px 0; color: #FFFFFF; letter-spacing: -1px;
    }

    .error-desc {
      font-size: 18px; color: #A0C4D6; line-height: 1.6; margin: 0 auto 40px auto; max-width: 450px;
    }

    .btn-return {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 35px; background: #FFD700; color: #00111A;
      border-radius: 50px; font-size: 16px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-return:hover {
      background: #FFFFFF; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
    }

    .btn-return svg { transition: transform 0.3s; }
    .btn-return:hover svg { transform: translateX(-5px); }

    /* Floating radar animation */
    .radar {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 400px; height: 400px; border-radius: 50%; border: 1px solid rgba(255, 215, 0, 0.1);
      z-index: 1; pointer-events: none;
    }
    .radar::after {
      content: ''; position: absolute; inset: -1px; border-radius: 50%;
      border: 1px solid rgba(255, 215, 0, 0.3); animation: ping 3s infinite linear;
    }
    @keyframes ping {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* --- Preloader Styles --- */
    #preloader {
      position: fixed;
      inset: 0;
      background-color: #ffffff; 
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }
    .loader-stage {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 2.5rem;
    }
    .vehicle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      opacity: 0;
      color: #FFD700; /* Premium Gold Yellow */
    }
    .ship { animation: sequenceShip 3s linear forwards; }
    .truck { animation: sequenceTruck 3s linear forwards; }
    .plane { animation: sequencePlane 3s linear forwards; }
    @keyframes sequenceShip {
      0% { opacity: 0; transform: translate(-120%, -50%); }
      6.6% { opacity: 1; transform: translate(-50%, -50%); } 
      26.6% { opacity: 1; transform: translate(-50%, -50%); } 
      33.3% { opacity: 0; transform: translate(20%, -50%); } 
      100% { opacity: 0; transform: translate(20%, -50%); }
    }
    @keyframes sequenceTruck {
      0%, 33.3% { opacity: 0; transform: translate(-120%, -50%); }
      40% { opacity: 1; transform: translate(-50%, -50%); } 
      60% { opacity: 1; transform: translate(-50%, -50%); } 
      66.6% { opacity: 0; transform: translate(20%, -50%); } 
      100% { opacity: 0; transform: translate(20%, -50%); }
    }
    @keyframes sequencePlane {
      0%, 66.6% { opacity: 0; transform: translate(-120%, 20%); }
      73.3% { opacity: 1; transform: translate(-50%, -50%); } 
      93.3% { opacity: 1; transform: translate(-50%, -50%); } 
      100% { opacity: 0; transform: translate(20%, -120%); } 
    }
    .loading-text-container {
      color: #0f172a;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      height: 24px;
    }
    .loading-text::after {
      content: "Preparing Cargo...";
      animation: textChange 3s linear forwards;
    }
    @keyframes textChange {
      0%, 32.9% { content: "Loading Cargo..."; }
      33%, 65.9% { content: "Dispatching Fleet..."; }
      66%, 100% { content: "Taking Off..."; }
    }
    .progress-container {
      width: 240px;
      height: 4px;
      background-color: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: #FFD700;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
      animation: fillProgress 3s linear forwards;
    }
    @keyframes fillProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    .main-content {
      opacity: 0;
      transition: opacity 0.8s ease;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .main-content.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Preloader Overlay -->
  <div id="preloader">
    <div class="loader-stage">
      <!-- 1. Ship Icon -->
      <svg class="vehicle ship" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1 .6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1 .6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2"/>
        <path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.76"/>
        <path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/>
        <path d="M12 10v4"/>
        <path d="M12 2v3"/>
      </svg>
      <!-- 2. Truck Icon -->
      <svg class="vehicle truck" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13"></rect>
        <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
        <circle cx="5.5" cy="18.5" r="2.5"></circle>
        <circle cx="18.5" cy="18.5" r="2.5"></circle>
      </svg>
      <!-- 3. Flight/Plane Icon -->
      <svg class="vehicle plane" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6.5 2.5L7 13l-4 1L2 15l4 2 2 4 1-1 1-4 2.5-2.5 2.5 6.5c.3.5.7.9 1.2.9.4.1.9-.3 1.1-.7l1.8-8.2z"/>
      </svg>
    </div>
    <div class="loading-text-container">
      <span class="loading-text"></span>
    </div>
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
  </div>

  <div id="mainContent" class="main-content">

  <div class="bg-animation"></div>
  <div class="radar"></div>

  <div class="error-container">
    <div class="auth-brand">
      <a href="index.html">
        <img src="whitelogo.webp" alt="Stackly Logo" style="height: 40px; filter: brightness(0) invert(1); margin: 0 auto 30px auto; display: block;">
      </a>
    </div>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Lost at Sea</h2>
    <p class="error-desc">The coordinates you entered don't exist in our navigational charts. Let's get your cargo back on the correct routing.</p>
    
    <a href="index.html" class="btn-return">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Return to Port
    </a>
  </div>

  </div> <!-- End mainContent wrapper -->

  <script>
    // Preloader Control Logic
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const preloader = document.getElementById('preloader');
        const mainContent = document.getElementById('mainContent');
        if (preloader) {
          preloader.style.opacity = '0';
          preloader.style.visibility = 'hidden';
          if (mainContent) mainContent.classList.add('visible');
          setTimeout(() => preloader.remove(), 500);
        }
      }, 3000);
    });
  </script>
</body>
</html>
